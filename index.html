<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyond The Bubble</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: Georgia, "Times New Roman", serif;
    background: #d4f000;
    color: #111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }
  .cover {
    position: relative;
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 72px;
    overflow: hidden;
  }
  .cover img.bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
    pointer-events: none;
    user-select: none;
  }
  .layout {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 64px;
    width: 100%;
  }
  .left { max-width: 580px; flex-shrink: 0; }
  h1 {
    font-size: clamp(52px, 9vw, 108px);
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: -0.02em;
    color: #111;
    margin-bottom: 28px;
  }
  .subtitle {
    font-size: clamp(18px, 2.2vw, 24px);
    font-weight: 400;
    line-height: 1.35;
    color: #333;
    max-width: 480px;
    margin-bottom: 52px;
  }
  nav {
    display: flex;
    flex-direction: column;
    max-width: 500px;
  }
  nav a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 0;
    border-top: 1px solid rgba(0,0,0,0.25);
    text-decoration: none;
    color: #111;
    font-size: clamp(16px, 1.8vw, 20px);
    font-family: Georgia, serif;
    transition: padding-left 0.2s;
  }
  nav a:last-child { border-bottom: 1px solid rgba(0,0,0,0.25); }
  nav a:hover { padding-left: 8px; }
  .nav-label { flex: 1; }
  .nav-sub {
    font-size: 11px;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: rgba(0,0,0,0.4);
    margin-left: 16px;
    letter-spacing: 0.02em;
  }
  .arrow { font-size: 18px; flex-shrink: 0; margin-left: 16px; }

  .right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .partners-main {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 36px;
    margin-bottom: 44px;
  }
  .partners-main img {
    height: 104px;
    width: auto;
    max-width: 280px;
    object-fit: contain;
    filter: brightness(0);
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .partners-main img.nioo {
    height: 130px;
  }
  .partners-main img:hover { opacity: 1; }
  .partners-main a, .partners-secondary a { display: inline-block; line-height: 0; }

  .partners-secondary {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 32px;
    padding-top: 36px;
    border-top: 1px solid rgba(0,0,0,0.2);
  }
  .partners-secondary img {
    height: 102px;
    width: auto;
    max-width: 220px;
    object-fit: contain;
    filter: brightness(0);
    opacity: 0.55;
    transition: opacity 0.2s;
  }
  .partners-secondary img:hover { opacity: 0.85; }

  footer {
    position: relative;
    z-index: 2;
    padding: 24px 72px;
    font-size: 12px;
    color: rgba(0,0,0,0.4);
    display: flex;
    justify-content: flex-end;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    letter-spacing: 0.04em;
  }
  @media (max-width: 900px) {
    .layout { flex-direction: column; align-items: flex-start; }
    .right { flex-direction: row; align-items: center; flex-wrap: wrap; gap: 24px; }
    .partners-main, .partners-secondary { flex-direction: row; border-top: none; padding-top: 0; margin-bottom: 0; }
    .partners-main img, .partners-main img.nioo { height: 56px; }
    .partners-secondary img { height: 44px; }
  }
  @media (max-width: 600px) {
    .cover { padding: 40px 28px; }
    footer { padding: 20px 28px; }
    .nav-sub { display: none; }
  }
  .partners-secondary img.radboud { height: 122px; }
  .partners-secondary img.tudelft { height: 80px; }
</style>
</head>
<body>
<div class="cover">
  <img class="bg" src="btb_cover_-_beeld.jpg" alt="">

  <div class="layout">
    <div class="left">
      <h1>Beyond<br>The Bubble</h1>
      <p class="subtitle">Ecological Empathy through<br>Immersive Interaction with<br>Other-Than-Human Worlds</p>

      <nav>
        <a href="proposal.html">Proposal <span class="arrow">→</span></a>
        <a href="research.html">Research <span class="arrow">→</span></a>
        <a href="who-we-are.html">Who we are <span class="arrow">→</span></a>
        <a href="contact.html">Contact <span class="arrow">→</span></a>
      </nav>
    </div>

    <div class="right">
      <div class="partners-main">
        <a href="https://nioo.knaw.nl" target="_blank"><img class="nioo" src="https://mda.nioo.knaw.nl/images/nioologotrans%20testFR.gif" alt="NIOO-KNAW"></a>
        <a href="https://www.artis.nl" target="_blank"><img src="https://fimnederland.nl/wp-content/uploads/2020/03/ARTIS_logo_black_b379d9b93f37ba4b9daf62473d042d64.png" alt="ARTIS"></a>
        <a href="https://www.naturalis.nl" target="_blank"><img src="https://archives.naturalis.nl/wp-content/uploads/2022/05/logo-c5ac5c12.png" alt="Naturalis"></a>
      </div>
      <div class="partners-secondary">
        <a href="https://www.ru.nl" target="_blank"><img class="radboud" src="https://www.ru.nl/sites/default/files/2023-08/RU_logo_NL.png" alt="Radboud University"></a>
        <a href="https://www.tudelft.nl" target="_blank"><img class="tudelft" src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fde%2Fthumb%2Fb%2Fb5%2FTU_Delft_Logo.svg%2F960px-TU_Delft_Logo.svg.png%3F20110331144403&f=1&nofb=1&ipt=3d4face674c1873019acf4038bd7c043ef580384d987f525d6e1a71c9925cac3" alt="TU Delft"></a>
      </div>
    </div>
  </div>
</div>

<footer>
  <span>2026–2028</span>
</footer>

</body>
</html>
