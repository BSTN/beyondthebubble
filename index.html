<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beyond the Human Bubble</title>
    <meta name="description" content="" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background: #f5f3ee;
        color: #1a1a18;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 48px 64px 0;
      }

      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #888;
        margin-bottom: 16px;
      }

      h1 {
        font-size: clamp(32px, 5vw, 64px);
        font-weight: 400;
        line-height: 1.08;
        letter-spacing: -0.02em;
        max-width: 720px;
      }

      h1 em {
        font-style: italic;
        color: #2a6b5c;
      }

      .tagline {
        margin-top: 24px;
        font-size: 16px;
        color: #555;
        max-width: 480px;
        line-height: 1.6;
      }

      nav {
        padding: 64px 64px 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      nav a {
        display: flex;
        align-items: baseline;
        gap: 20px;
        padding: 20px 0;
        border-top: 1px solid #d4d0c8;
        text-decoration: none;
        color: #1a1a18;
        transition: color 0.15s;
      }

      nav a:last-child {
        border-bottom: 1px solid #d4d0c8;
      }

      nav a:hover {
        color: #2a6b5c;
      }

      nav a:hover .arrow {
        transform: translateX(4px);
      }

      .nav-num {
        font-size: 11px;
        color: #aaa;
        width: 24px;
        flex-shrink: 0;
      }

      .nav-label {
        font-size: clamp(20px, 3vw, 28px);
        font-weight: 400;
        letter-spacing: -0.01em;
        flex: 1;
      }

      .nav-sub {
        font-size: 13px;
        color: #888;
        max-width: 320px;
      }

      .arrow {
        font-size: 20px;
        transition: transform 0.15s;
        flex-shrink: 0;
      }

      footer {
        margin-top: auto;
        padding: 48px 64px;
        font-size: 12px;
        color: #aaa;
        display: flex;
        justify-content: space-between;
      }

      @media (max-width: 600px) {
        header,
        nav,
        footer {
          padding-left: 24px;
          padding-right: 24px;
        }
        .nav-sub {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <p class="eyebrow">ADRIE 2A — Zone2Source</p>
      <h1>Beyond the <em>Human Bubble</em></h1>
      <p class="tagline">
        A two-year artistic research programme on ecological empathy and
        immersive experience.
      </p>
    </header>

    <nav>
      <a href="proposal.pdf">
        <span class="nav-num">01</span>
        <span class="nav-label">Proposal</span>
        <span class="nav-sub"
          >Full project proposal — Beyond the Human Bubble</span
        >
        <span class="arrow">→</span>
      </a>
      <a href="who-we-are.html">
        <span class="nav-num">02</span>
        <span class="nav-label">Who we are</span>
        <span class="nav-sub">The consortium — makers, partners, advisors</span>
        <span class="arrow">→</span>
      </a>
    </nav>

    <footer>
      <span>Zone2Source · Amstelpark, Amsterdam</span>
      <span>2026</span>
    </footer>
  </body>
</html>
